<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>раздача стиля</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=PT+Mono&family=Special+Elite&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Текстурные оверлеи -->
  <svg class="grain-svg" aria-hidden="true">
    <filter id="grain-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#grain-filter)"/>
  </svg>
  <div class="grain"></div>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <div id="app"></div>

  <div id="tab-bar" class="tab-bar">
    <button class="tab-btn active" data-tab="home" onclick="tabNavigate('home')">
      <span class="tab-icon">◈</span>
      <span class="tab-label">ГЛАВНАЯ</span>
    </button>
    <button class="tab-btn" data-tab="feed" onclick="tabNavigate('feed')">
      <span class="tab-icon">▦</span>
      <span class="tab-label">КОНТЕНТ</span>
    </button>
    <button class="tab-btn" data-tab="course" onclick="tabNavigate('course')">
      <span class="tab-icon">▷</span>
      <span class="tab-label">КУРС</span>
    </button>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
